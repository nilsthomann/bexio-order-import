name: Build & Test (PR)

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BexioOrderImport.slnx

      - name: Build solution
        run: dotnet build BexioOrderImport.slnx -c Release --no-restore

      - name: Run unit tests with coverage
        run: dotnet test BexioOrderImport.slnx -c Release --no-build --collect:"XPlat Code Coverage" --results-directory ./TestResults /p:Exclude="[BexioOrderImport.Wpf]BexioOrderImport.Wpf.Views.*%2C[BexioOrderImport.Wpf]BexioOrderImport.Wpf.Converters.*%2C[BexioOrderImport.Wpf]BexioOrderImport.Wpf.Helpers.WindowHelper%2C[BexioOrderImport.Wpf]BexioOrderImport.Wpf.App%2C[BexioOrderImport.Wpf]BexioOrderImport.Wpf.Resources.*"

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Coverage Summary
        run: reportgenerator "-reports:TestResults/**/coverage.cobertura.xml" "-targetdir:TestResults/CoverageReport" "-reporttypes:MarkdownSummary"

      - name: Publish Coverage to GitHub Run Summary
        run: |
          Get-Content -Path TestResults/CoverageReport/Summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
        shell: powershell
