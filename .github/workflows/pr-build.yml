name: Build & Test (PR)

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      contents: read
      code-quality: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies (incl. local tools)
        run: dotnet tool restore && dotnet restore BexioOrderImport.slnx

      - name: Build solution
        run: dotnet build BexioOrderImport.slnx -c Release --no-restore

      - name: Run unit tests & generate coverage
        working-directory: build
        run: powershell -File run-coverage.ps1 -Configuration Release -CI

      - name: Publish Coverage to GitHub Run Summary
        run: |
          Get-Content -Path TestResults/CoverageReport/Summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
        shell: powershell

      - name: Copy Coverage File to Static Path
        run: |
          $covFile = (Get-ChildItem -Path TestResults -Filter "coverage.cobertura.xml" -Recurse | Select-Object -First 1).FullName
          Copy-Item -Path $covFile -Destination TestResults/coverage.cobertura.xml
        shell: powershell

      - name: Upload coverage to GitHub native API
        uses: actions/upload-code-coverage@v1
        with:
          file: TestResults/coverage.cobertura.xml
          language: csharp
          label: code-coverage-cobertura
          fail-on-error: false
