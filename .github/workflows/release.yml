name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BexioOrderImport.slnx

      - name: Run unit tests
        run: dotnet test BexioOrderImport.slnx -c Release

      - name: Publish WPF App (win-x64 Single File)
        run: |
          dotnet publish src/BexioOrderImport.Wpf/BexioOrderImport.Wpf.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: Compile Inno Setup Installer
        run: |
          iscc build/setup.iss /DAppVersion=${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Output/BexioOrderImportSetup.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
