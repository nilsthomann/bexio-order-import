name: Create Release
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - 'v*'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies (incl. local tools)
        run: dotnet tool restore && dotnet restore BexioOrderImport.slnx
 
      - name: Run unit tests & generate coverage
        working-directory: build
        run: powershell -File run-coverage.ps1 -Configuration Release -CI

      - name: Publish WPF App (win-x64 Single File)
        run: |
          dotnet publish src/BexioOrderImport.Wpf/BexioOrderImport.Wpf.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: Strip v-prefix from tag for installer version
        id: version
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          echo "version=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Compile Inno Setup Installer
        run: |
          iscc build/setup.iss /DAppVersion=${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: build/Output/BexioOrderImportSetup.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
